name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore OneVolume.slnx

      - name: Build
        run: dotnet build OneVolume.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/OneVolume.Core.Tests/OneVolume.Core.Tests.csproj -c Release --no-build --verbosity normal

      - name: Publish (win-x64)
        run: ./build/publish.ps1 -Runtime win-x64
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OneVolume-win-x64
          path: dist/win-x64/
